name: Deploy n8n

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 34.205.228.93 >> ~/.ssh/known_hosts

      - name: Debug key fingerprint
        run: |
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          ssh-keygen -lf ~/.ssh/deploy_key.pub

      - name: Deploy
        run: |
          scp -i ~/.ssh/deploy_key backup.sh ec2-user@34.205.228.93:/home/ec2-user/n8n-backup/backup.sh
          ssh -i ~/.ssh/deploy_key ec2-user@34.205.228.93 '
            chmod +x /home/ec2-user/n8n-backup/backup.sh &&
            cd /opt/n8n &&
            docker-compose pull &&
            docker-compose up -d
          '
